<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Type One Smart</title>
     <link rel="stylesheet" href="Index1.css">
    </head>

	<body>
	   <div id="wrapper">
        <header>
            <h1><a href="index1.html">Type One Smart</a></h1>
        </header> 
        <nav>
            <ul>
                <li><a href="index1.html">Home</a></li>
                <li><a href="diabetes.html">Diabetes</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <div id="diabeteshero" class="hero">
    </div>
  <main>
    <section id="top">
      <h1>Contact Us</h1>
	  <h2>We'd Love to Hear Your Thoughts</h2>

<aside>
     <form>
        <fieldset>
          <legend>Submit a Question</legend>

          <label for="name">Name</label><br />
          <input type="text" id="name" name="name" placeholder="Full Name" required /><br />

          <label for="email">Email</label><br />
          <input type="email" id="email" name="email" placeholder="example@mail.com" required /><br />

          <label for="phone">Phone</label><br />
          <input type="tel" id="phone" name="phone" placeholder="123-456-7890" pattern="^\d{10}$|^(\(\d{3}\)\s*)?\d{3}[\s-]?\d{4}" /><br />

          <p>Preferred Contact Method</p>
          <label><input type="radio" name="contactMethod" value="email" required /> Email</label>
          <label><input type="radio" name="contactMethod" value="phone" required /> Phone</label><br />

          <label for="questions">Questions</label><br />
          <textarea id="questions" name="questions" rows="4" cols="40"></textarea><br />

          <button type="submit">Submit</button>
        </fieldset>
      </form>
</aside>


    </section>
  </main>

  <footer>
    <p><a href="#top"><img src="typeone_logo.png" alt="T1S Footer Image" /></a></p>
    <p>
      <a href="index1.html" style="color: black; text-decoration: none;">Type One Smart</a><br />
	    Calexico, CA 92231
    </p>
  </footer>

  <!-- JavaScript Form Functionality -->
 <script>
  // Function 1: Validate form data
  function validateFormData(firstName, lastName, email, phone, address, preferredContact) {
    if (
      firstName.trim() === '' ||
      lastName.trim() === '' ||
      email.trim() === '' ||
      phone.trim() === '' ||
      address.trim() === '' ||
      !preferredContact
    ) {
      return false;
    }

    // Validate email format
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!emailPattern.test(email)) return false;

    // Validate phone (simple 10-digit check)
    const phonePattern = /^\d{10}$/;
    if (!phonePattern.test(phone)) return false;

    return true;
  }

  // Function 2: Handle form submission
  function handleFormSubmit(event) {
    event.preventDefault();

    const firstName = document.getElementById("firstName").value;
    const lastName = document.getElementById("lastName").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const preferredContact = document.querySelector('input[name="preferredContact"]:checked')?.value;
    const messageDiv = document.getElementById("message");

    if (validateFormData(firstName, lastName, email, phone, address, preferredContact)) {
      messageDiv.innerHTML = `
        <p>Thank you, <strong>${firstName} ${lastName}</strong>!</p>
        <p>We’ll reach out to you via <strong>${preferredContact}</strong> at ${preferredContact === 'Email' ? email : phone}.</p>
        <p>Your address on file is: <em>${address}</em></p>
      `;
      messageDiv.style.color = "white";
    } else {
      messageDiv.innerHTML = "<p>Please fill out all fields correctly.</p>";
      messageDiv.style.color = "red";
    }
  }

  // Wait for the DOM to be fully loaded before attaching event
  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("contactForm").addEventListener("submit", handleFormSubmit);
  });
</script>
</body>
</html>
